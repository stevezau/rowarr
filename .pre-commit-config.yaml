repos:
  # Keep this rev in step with the ruff CI installs (ci.yml runs `ruff check .` + `ruff format
  # --check .`) and the `ruff>=0.5` dev dep — a stale pin here would format differently than CI and
  # the guard would pass while GitHub fails.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key
      - id: check-merge-conflict
